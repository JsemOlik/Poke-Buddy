name: Build & Push Docker Images

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push bot
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/jsemolik/poke-buddy-bot:latest
            ghcr.io/jsemolik/poke-buddy-bot:${{ github.sha }}

      - name: Build & push solver
        uses: docker/build-push-action@v6
        with:
          context: ./ez-solver
          file: ./ez-solver/Dockerfile.solver
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ghcr.io/jsemolik/poke-buddy-solver:latest
            ghcr.io/jsemolik/poke-buddy-solver:${{ github.sha }}
